<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

      <h2>Why do we use it?</h2>

      <iframe
        id="map"
        src="https://www.google.com/maps/embed?pb=..."
